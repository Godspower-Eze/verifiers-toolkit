<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    ZK arithmetic circuit gate symbol.
    A diamond node (the constraint gate) with four wire traces extending
    to the edges — exactly as drawn in ZK circuit papers.
    Stroke-only. Single flat color. Nothing else.
  -->
  <path d="M20 12 L28 20 L20 28 L12 20 Z"
        stroke="#cbd5e1"
        stroke-width="1.3"
        stroke-linejoin="miter"
        fill="none"/>
  <line x1="20" y1="12" x2="20" y2="3"  stroke="#cbd5e1" stroke-width="1.3" stroke-linecap="square"/>
  <line x1="28" y1="20" x2="37" y2="20" stroke="#cbd5e1" stroke-width="1.3" stroke-linecap="square"/>
  <line x1="20" y1="28" x2="20" y2="37" stroke="#cbd5e1" stroke-width="1.3" stroke-linecap="square"/>
  <line x1="12" y1="20" x2="3"  y2="20" stroke="#cbd5e1" stroke-width="1.3" stroke-linecap="square"/>
</svg>
